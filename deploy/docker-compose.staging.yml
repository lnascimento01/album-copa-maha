name: maha-copa-album-staging

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.staging
      args:
        WWWUSER: "${WWWUSER:-1000}"
        WWWGROUP: "${WWWGROUP:-1000}"
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      APP_ENV: "${APP_ENV:-staging}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: 0
      SKIP_ASSET_BUILD: "${SKIP_ASSET_BUILD:-0}"
    working_dir: /var/www/html
    volumes:
      - ../:/var/www/html
      - staging_storage_public:/var/www/html/storage/app/public
      - staging_storage_logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/9000' 2>/dev/null || exit 1"]
      start_period: 180s
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - staging

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${STAGING_HTTP_PORT:-8080}:80"
    volumes:
      - ../:/var/www/html:ro
      - staging_storage_public:/var/www/html/storage/app/public:ro
      - ./nginx/app.conf.example:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - staging

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-change_me_root}"
      MYSQL_DATABASE: "${DB_DATABASE:-maha_copa_album}"
      MYSQL_USER: "${DB_USERNAME:-maha_user}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-change_me}"
    volumes:
      - staging_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u${DB_USERNAME:-maha_user} -p${DB_PASSWORD:-change_me} --silent"]
      interval: 30s
      timeout: 5s
      retries: 10
    networks:
      - staging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - staging_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - staging

networks:
  staging:
    driver: bridge

volumes:
  staging_mysql_data:
  staging_redis_data:
  staging_storage_public:
  staging_storage_logs:
