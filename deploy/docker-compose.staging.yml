name: maha-copa-album-staging

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.staging
      args:
        WWWUSER: "${WWWUSER:-1000}"
        WWWGROUP: "${WWWGROUP:-1000}"
        VITE_ONESIGNAL_APP_ID: "${VITE_ONESIGNAL_APP_ID}"
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      APP_ENV: "${APP_ENV:-staging}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: 0
    working_dir: /var/www/html
    # No source bind-mount: the code is baked into the image so the running
    # release is immutable. Only persistent state and the shared public
    # assets volume are mounted.
    volumes:
      - staging_app_public:/var/www/html/public
      - staging_storage_public:/var/www/html/storage/app/public
      - staging_storage_logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Assets are pre-built, so the container is ready in seconds. A short
      # start_period keeps `docker rollout` from waiting needlessly before it
      # swaps traffic to the new container.
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/9000' 2>/dev/null || exit 1"]
      start_period: 30s
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - staging

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${STAGING_HTTP_PORT:-8080}:80"
    # nginx serves the static assets straight from the shared public volume
    # (populated by the app container) and proxies PHP to app:9000. It re-
    # resolves the `app` hostname per request via Docker DNS, so a rollout
    # that swaps the app container needs no nginx restart (see app.conf).
    volumes:
      - staging_app_public:/var/www/html/public:ro
      - staging_storage_public:/var/www/html/storage/app/public:ro
      - ./nginx/app.conf.example:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - staging

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-change_me_root}"
      MYSQL_DATABASE: "${DB_DATABASE:-maha_copa_album}"
      MYSQL_USER: "${DB_USERNAME:-maha_user}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-change_me}"
    ports:
      - "3310:3306"
    volumes:
      - staging_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u${DB_USERNAME:-maha_user} -p${DB_PASSWORD:-change_me} --silent"]
      interval: 30s
      timeout: 5s
      retries: 10
    networks:
      - staging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - staging_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - staging

networks:
  staging:
    driver: bridge

volumes:
  staging_mysql_data:
  staging_redis_data:
  staging_app_public:
  staging_storage_public:
  staging_storage_logs:
